constants:
  TARGET_PATH: $$$ROOT_DIR$$$/$$$TARGET_NAME$$$
---
general:
  logger:
    log-level: info
    file: $$$WORK_DIR$$$/work/log.txt
  monitor:
    enable: true
    sample-rate: 50

testcase:
  module: load
  module-options:
    input-directory: $$$MW_TESTCASE_DIRECTORY$$$

trace:
  module: load
  module-options:
    input-directory: $$$MW_TRACE_DIRECTORY$$$
  options:
    input-buffer-size: 4

preprocess:
  module: js
  module-options:
    output-directory: $$$MW_TRACE_DIRECTORY$$$
    map-directory: $$$MW_TRACE_DIRECTORY$$$
    store-traces: true
    keep-raw-traces: true
  options:
    input-buffer-size: 4
    max-parallel-threads: 4

analysis:
  modules:
    - module: control-flow-leakage
      module-options:
        output-directory: $$$WORK_DIR$$$/persist/results
        dump-call-tree: true
        include-testcases-in-call-stacks: true
    - module: dump
      module-options:
        output-directory: $$$WORK_DIR$$$/persist/traces
  options:
    input-buffer-size: 1
    max-parallel-threads: 1
